script: dr_scad
estimator: dr
dgp: default

# Include x3 (noise) on both sides so each penalty has something to prune.
selection_formula: "~ x1 + x2 + x3"
outcome_rhs: "x1 + x2 + x3"

n_pop: [10000]
n_nonprob: [500]
n_prob: [500]
method_selection: [logit]
method_outcome: [glm]
family_outcome: [gaussian]
target_var: ["y"]
vars_selection: [true]
penalty: [SCAD, lasso, MCP]
nfolds: [5]
var_method: [analytic]

n_reps: 30
alpha: [0.05]
seed: 2026
