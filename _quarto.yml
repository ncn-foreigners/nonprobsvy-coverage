project:
  type: website
  output-dir: _site

website:
  title: "nonprobsvy Coverage"
  description: "Empirical coverage of confidence intervals from the nonprobsvy R package."
  repo-url: https://github.com/ncn-foreigners/nonprobsvy-coverage
  repo-actions: [edit, issue]
  navbar:
    background: light
    left:
      - text: Home
        href: index.qmd
      - text: IPW
        menu:
          - text: IPW (MLE)
            href: doc/ipw/ipw_mle.qmd
          - text: IPW (GEE)
            href: doc/ipw/ipw_gee.qmd
          - text: IPW (variable selection)
            href: doc/ipw/ipw_scad.qmd
          - text: "---"
          - text: Kim et al. (2021) DGP
            href: doc/ipw/ipw_kim2021.qmd
      - text: MI
        menu:
          - text: MI (GLM)
            href: doc/mi/mi_glm.qmd
          - text: MI (nearest neighbour)
            href: doc/mi/mi_nn.qmd
          - text: MI (predictive mean matching)
            href: doc/mi/mi_pmm.qmd
          - text: MI (nonparametric / loess)
            href: doc/mi/mi_npar.qmd
    right:
      - icon: github
        href: https://github.com/ncn-foreigners/nonprobsvy-coverage
  page-footer:
    left: "Built with [Quarto](https://quarto.org). Source on [GitHub](https://github.com/ncn-foreigners/nonprobsvy-coverage)."
    right: "NCN OPUS 20 grant no. 2020/39/B/HS4/00941"

format:
  html:
    theme: cosmo
    toc: true
    code-tools: false
    knitr:
      opts_chunk:
        echo: false
        warning: false
        message: false
