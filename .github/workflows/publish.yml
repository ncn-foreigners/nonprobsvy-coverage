name: publish

# Re-render the Quarto site without rerunning simulations.
# Triggered by doc-only changes and by manual dispatch.
# Each <family>_sim.yml workflow ALSO renders + deploys at the end of its
# run, so this workflow is mostly for "I edited a qmd, just rebuild".

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'doc/**'
      - '_quarto.yml'
      - 'index.qmd'
      - 'README.md'
      - '.github/workflows/publish.yml'

permissions:
  contents: write       # needed to push to the gh-pages branch
  pages: write

concurrency:
  group: pages-deploy        # shared with each *_sim.yml's deploy job
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          extra-packages: |
            any::knitr
            any::rmarkdown
      - name: Install nonprobcover
        run: R CMD INSTALL --no-help --no-html --no-byte-compile .

      - uses: quarto-dev/quarto-actions/setup@v2
      - name: Render site
        run: quarto render
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
