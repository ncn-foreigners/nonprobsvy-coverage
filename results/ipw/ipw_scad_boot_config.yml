script: ipw_scad_boot
estimator: ipw
dgp: default

# Bootstrap-only counterpart of ipw_scad. CV inside each fit makes the
# inner bootstrap loop expensive, so we cap n_reps and num_boot.
selection_formula: "~ x1 + x2 + x3"

n_pop: [10000]
n_nonprob: [500]
n_prob: [500]
method_selection: [logit]
target_var: ["y"]
vars_selection: [true]
penalty: [SCAD, lasso, MCP]
nfolds: [5]
var_method: [bootstrap]
rep_type: [subbootstrap]

n_reps: 100
num_boot: 50
alpha: [0.05]
seed: 2026
