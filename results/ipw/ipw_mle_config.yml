script: ipw_mle
estimator: ipw
dgp: default

selection_formula: "~ x1 + x2"

n_pop: [10000]
n_nonprob: [500]
n_prob: [500]
method_selection: [logit]
target_var: ["y"]   # quoted: bare 'y' is a YAML 1.1 boolean (TRUE)
var_method: [analytic, bootstrap]
rep_type: [subbootstrap]

n_reps: 500
num_boot: 200
alpha: [0.05, 0.10]
seed: 2026
